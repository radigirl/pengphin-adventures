<div class="game-page">
  <div class="game-shell">
    <header class="game-header">
      <h1>Ocean World</h1>
    </header>

    <div class="hud-row">
      <app-score-bar
        [level]="currentLevel"
        [coins]="0">
      </app-score-bar>
    </div>

    <div class="mascot-bar">
      <div class="mascot-chip">🐧 Peng</div>
      <div class="mascot-chip">🐬 Phin</div>
    </div>

    <section class="play-area">
      <aside class="mascot-side" aria-hidden="true">
        <div class="mascot-circle">🐧</div>
      </aside>

      <div class="board-wrap">
        <div class="board">
          <app-memory-card
            *ngFor="let card of cards"
            [card]="card">
          </app-memory-card>
        </div>
      </div>

      <aside class="mascot-side" aria-hidden="true">
        <div class="mascot-circle">🐬</div>
      </aside>
    </section>
  </div>
</div>
