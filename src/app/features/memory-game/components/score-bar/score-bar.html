<div
  class="score-bar"
  [ngStyle]="{
    background: backgroundColor,
    color: textColor
  }"
>
  <div class="score-item">⭐ Level {{ level }}</div>
  <div class="score-item">💰 Coins: {{ coins }}</div>

  <button
    class="hint-button"
    type="button"
    [disabled]="hintDisabled"
    [ngStyle]="{
      background: hintButtonBg,
      color: hintButtonTextColor
    }"
    (click)="onHintClick()"
  >
    💡 Hint (-{{ hintCost }})
  </button>
</div>
